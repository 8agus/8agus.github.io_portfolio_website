<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1005"/>
      <stop offset="100%" style="stop-color:#251808"/>
    </linearGradient>
    <linearGradient id="cert" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1408"/>
      <stop offset="100%" style="stop-color:#2c1e0c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C658C"/>
      <stop offset="100%" style="stop-color:#2a8cb8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" fill="url(#bg)"/>

  <!-- Left: Terminal/code area -->
  <rect x="0" y="0" width="340" height="260" fill="rgba(6,6,6,0.85)"/>
  <rect x="0" y="0" width="340" height="30" fill="rgba(20,20,20,0.9)"/>
  <!-- Terminal dots -->
  <circle cx="20" cy="15" r="6" fill="#ef4444"/>
  <circle cx="40" cy="15" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="15" r="6" fill="#39FF14"/>
  <text x="100" y="19" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">certificate_generator.py</text>

  <!-- Code lines -->
  <text x="16" y="54" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,100,100,0.7)">import</text>
  <text x="62" y="54" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.6)"> csv, json, os</text>

  <text x="16" y="70" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,100,100,0.7)">from</text>
  <text x="50" y="70" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.6)"> reportlab </text>
  <text x="130" y="70" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,100,100,0.7)">import</text>
  <text x="174" y="70" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.6)"> canvas</text>

  <text x="16" y="94" font-family="'Courier New', monospace" font-size="10" fill="rgba(100,160,255,0.8)">def</text>
  <text x="38" y="94" font-family="'Courier New', monospace" font-size="10" fill="rgba(57,255,20,0.9)"> generate_certificate</text>
  <text x="206" y="94" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.6)">(data):</text>

  <text x="32" y="110" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.45)">  c = canvas.Canvas(</text>
  <text x="32" y="126" font-family="'Courier New', monospace" font-size="10" fill="rgba(200,160,80,0.8)">"certificate.pdf"</text>
  <text x="32" y="142" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.45)">  c.drawString(100, 700,</text>
  <text x="32" y="158" font-family="'Courier New', monospace" font-size="10" fill="rgba(200,160,80,0.8)">    data["name"]</text>
  <text x="32" y="174" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.45)">  c.save()</text>

  <text x="16" y="198" font-family="'Courier New', monospace" font-size="10" fill="rgba(255,255,255,0.35)">--- Running batch job ---</text>
  <text x="16" y="214" font-family="'Courier New', monospace" font-size="10" fill="rgba(57,255,20,0.7)">✓ cert_001.pdf generated</text>
  <text x="16" y="230" font-family="'Courier New', monospace" font-size="10" fill="rgba(57,255,20,0.7)">✓ cert_002.pdf generated</text>
  <text x="16" y="246" font-family="'Courier New', monospace" font-size="10" fill="rgba(57,255,20,0.5)">✓ cert_003.pdf generated</text>

  <!-- Divider -->
  <rect x="340" y="0" width="2" height="260" fill="rgba(245,158,11,0.25)"/>

  <!-- Right: Certificate preview -->
  <rect x="342" y="0" width="458" height="260" fill="rgba(15,10,4,0.8)"/>

  <!-- Certificate card -->
  <rect x="362" y="20" width="418" height="220" rx="10" fill="url(#cert)"/>
  <rect x="362" y="20" width="418" height="220" rx="10" fill="none" stroke="rgba(245,158,11,0.4)" stroke-width="2"/>

  <!-- Certificate inner border -->
  <rect x="374" y="30" width="394" height="200" rx="6" fill="none" stroke="rgba(245,158,11,0.15)" stroke-width="1"/>

  <!-- Gold top bar -->
  <rect x="362" y="20" width="418" height="8" rx="4" fill="url(#gold)"/>

  <!-- Certificate header -->
  <text x="571" y="66" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="rgba(245,158,11,0.6)" letter-spacing="3">CERTIFICATE OF</text>
  <text x="571" y="90" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="700" fill="#f59e0b" letter-spacing="2">COMPLETION</text>

  <!-- Divider line -->
  <line x1="414" y1="100" x2="728" y2="100" stroke="rgba(245,158,11,0.3)" stroke-width="1"/>

  <!-- This certifies text -->
  <text x="571" y="118" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="1">This certifies that</text>

  <!-- Recipient name -->
  <text x="571" y="148" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" fill="rgba(255,255,255,0.9)">Jane Doe</text>
  <line x1="440" y1="158" x2="702" y2="158" stroke="rgba(245,158,11,0.2)" stroke-width="1"/>

  <!-- Course name -->
  <text x="571" y="176" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="1">has successfully completed</text>
  <text x="571" y="196" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.75)">Python for Data Automation</text>

  <!-- Footer row -->
  <text x="414" y="226" font-family="Georgia, 'Times New Roman', serif" font-size="8" fill="rgba(255,255,255,0.3)">12 May 2026</text>
  <rect x="560" y="218" width="130" height="1" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="rgba(255,255,255,0.2)"/>
  <text x="625" y="232" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="8" fill="rgba(255,255,255,0.35)">Authorised Signature</text>

  <!-- Gold bottom bar -->
  <rect x="362" y="232" width="418" height="8" rx="4" fill="url(#gold)"/>
</svg>
