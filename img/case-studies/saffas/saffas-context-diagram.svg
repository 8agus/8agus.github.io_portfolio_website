<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f35"/>
      <stop offset="100%" style="stop-color:#1C658C"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d45;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#243d5a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="65" x2="800" y2="65" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="130" x2="800" y2="130" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="195" x2="800" y2="195" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="260" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Nav bar mockup -->
  <rect x="40" y="28" width="340" height="36" rx="6" fill="url(#card)" opacity="0.9"/>
  <circle cx="62" cy="46" r="8" fill="#39FF14" opacity="0.8"/>
  <rect x="82" y="42" width="60" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>
  <rect x="154" y="42" width="45" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="210" y="42" width="55" height="8" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="318" y="38" width="48" height="16" rx="8" fill="#39FF14" opacity="0.85"/>

  <!-- Directory card 1 -->
  <rect x="40" y="80" width="155" height="80" rx="8" fill="url(#card)" opacity="0.85"/>
  <circle cx="68" cy="104" r="14" fill="#1C658C"/>
  <rect x="90" y="98" width="85" height="8" rx="4" fill="rgba(255,255,255,0.7)"/>
  <rect x="90" y="112" width="60" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="52" y="130" width="55" height="14" rx="7" fill="#39FF14" opacity="0.8"/>
  <rect x="115" y="130" width="55" height="14" rx="7" fill="rgba(28,101,140,0.7)"/>

  <!-- Directory card 2 -->
  <rect x="208" y="80" width="155" height="80" rx="8" fill="url(#card)" opacity="0.85"/>
  <circle cx="236" cy="104" r="14" fill="#2a5c8c"/>
  <rect x="258" y="98" width="80" height="8" rx="4" fill="rgba(255,255,255,0.7)"/>
  <rect x="258" y="112" width="55" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="220" y="130" width="55" height="14" rx="7" fill="#39FF14" opacity="0.8"/>
  <rect x="283" y="130" width="55" height="14" rx="7" fill="rgba(28,101,140,0.7)"/>

  <!-- Directory card 3 -->
  <rect x="40" y="174" width="155" height="70" rx="8" fill="url(#card)" opacity="0.85"/>
  <circle cx="68" cy="196" r="14" fill="#1a4a6c"/>
  <rect x="90" y="190" width="75" height="8" rx="4" fill="rgba(255,255,255,0.6)"/>
  <rect x="90" y="204" width="50" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>
  <rect x="52" y="220" width="55" height="14" rx="7" fill="#39FF14" opacity="0.7"/>

  <!-- Stats panel -->
  <rect x="208" y="174" width="155" height="70" rx="8" fill="url(#card)" opacity="0.85"/>
  <rect x="224" y="188" width="40" height="40" rx="6" fill="rgba(28,101,140,0.5)"/>
  <rect x="224" y="192" width="40" height="8" rx="2" fill="#39FF14" opacity="0.6"/>
  <rect x="224" y="204" width="40" height="6" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="224" y="214" width="40" height="6" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="275" y="188" width="72" height="10" rx="4" fill="rgba(255,255,255,0.6)"/>
  <rect x="275" y="204" width="50" height="8" rx="4" fill="rgba(57,255,20,0.4)"/>
  <rect x="275" y="218" width="60" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Right panel - title and info -->
  <rect x="420" y="28" width="340" height="216" rx="12" fill="rgba(10,25,45,0.7)"/>
  <rect x="420" y="28" width="340" height="4" rx="2" fill="#39FF14" opacity="0.5"/>

  <!-- Flag icon area -->
  <rect x="444" y="54" width="32" height="22" rx="3" fill="#006A4E"/>
  <rect x="444" y="54" width="32" height="22" rx="3" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <rect x="448" y="58" width="10" height="14" rx="1" fill="#FFB612"/>
  <circle cx="453" cy="65" r="4" fill="#DE3831"/>

  <text x="488" y="69" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">Saffas AE Connect</text>
  <text x="444" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">South African community platform · UAE</text>

  <!-- Stat badges -->
  <rect x="444" y="108" width="90" height="32" rx="6" fill="rgba(28,101,140,0.4)"/>
  <text x="454" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#39FF14">1,200+</text>
  <text x="454" y="134" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">Members</text>

  <rect x="546" y="108" width="80" height="32" rx="6" fill="rgba(28,101,140,0.4)"/>
  <text x="556" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#39FF14">Live</text>
  <text x="556" y="134" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">Production</text>

  <rect x="638" y="108" width="96" height="32" rx="6" fill="rgba(28,101,140,0.4)"/>
  <text x="648" y="122" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#39FF14">Full Stack</text>
  <text x="648" y="134" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.45)">Solo Build</text>

  <!-- Tech stack pills -->
  <rect x="444" y="154" width="62" height="20" rx="10" fill="rgba(0,0,0,0.4)"/>
  <text x="475" y="168" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#61DAFB">Next.js</text>

  <rect x="514" y="154" width="72" height="20" rx="10" fill="rgba(0,0,0,0.4)"/>
  <text x="550" y="168" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#3178C6">TypeScript</text>

  <rect x="594" y="154" width="72" height="20" rx="10" fill="rgba(0,0,0,0.4)"/>
  <text x="630" y="168" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#336791">PostgreSQL</text>

  <rect x="444" y="180" width="56" height="20" rx="10" fill="rgba(0,0,0,0.4)"/>
  <text x="472" y="194" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#5A29E4">Prisma</text>

  <rect x="444" y="210" width="298" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="444" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="rgba(57,255,20,0.6)">saffas.ae  ·  Running in production</text>
</svg>
